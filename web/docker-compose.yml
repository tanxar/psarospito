# Local PostgreSQL for Prisma (optional). Usage:
#   docker compose up -d
#   DATABASE_URL="postgres://app:app@localhost:5432/nestio" npx prisma migrate dev
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: nestio
    ports:
      - "5432:5432"
    volumes:
      - nestio_pg:/var/lib/postgresql/data

volumes:
  nestio_pg:
